  <!-- Text lines — left page -->
  <line x1="6"   y1="13.5" x2="12.5" y2="14"   stroke="#a07830" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="6"   y1="16.5" x2="11"   y2="16.9"  stroke="#a07830" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="6"   y1="19.5" x2="12.5" y2="20"   stroke="#a07830" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Text lines — right page -->
  <line x1="19.5" y1="14"   x2="26"   y2="13.5" stroke="#a07830" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="19.5" y1="16.9" x2="25"   y2="16.5" stroke="#a07830" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="19.5" y1="20"   x2="26"   y2="19.5" stroke="#a07830" stroke-width="0.9" stroke-linecap="round"/>
</svg>
