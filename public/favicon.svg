<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>
  <!-- Subtle gold frame -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.25"/>

  <!-- Left page -->
  <path d="M4 9 L14.5 10 L14.5 24 L4 23 Z" fill="#c9a84c"/>
  <!-- Left page bottom edge (thickness) -->
  <path d="M4 23 L14.5 24 L14.5 25 L4 24 Z" fill="#7a5800"/>

  <!-- Right page -->
  <path d="M17.5 10 L28 9 L28 23 L17.5 24 Z" fill="#c9a84c"/>
